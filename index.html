<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigación sentimental</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

h1{
    font-size:2.5rem;
}

.buttons{
    margin-top:30px;
}

button{
    padding:15px 35px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff4d88;
    color:white;
}

#no{
    background:#444;
    color:white;
    position:absolute;
}

.countdown{
    margin-top:30px;
    font-size:1.3rem;
}

</style>
</head>

<body>

<div class="container">

<h1>¿Quieres ser mi novia?</h1>

<p>
Sistema de compatibilidad sentimental iniciado.
</p>

<div class="buttons">
<button id="yes">Sí 💕</button>
<button id="no">No ❌</button>
</div>

<div class="countdown">
⏳ Tiempo restante:
<div id="timer"></div>
</div>

</div>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 50);

noBtn.style.left = `${x}px`;
noBtn.style.top = `${y}px`;

});

document.getElementById("yes").onclick = () => {
document.body.innerHTML = `
<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#0f0f0f;
color:white;
font-family:Arial;
">
<h1> Excelente decisión </h1>
<img src="foto.jpg" width="250">
<p>Compatibilidad confirmada exitosamente.</p>
</div>
`;
};

const targetDate = new Date("June 3, 2026 00:00:00").getTime();

const timer = setInterval(() => {

const now = new Date().getTime();
const distance = targetDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML =
`${days}d ${hours}h ${minutes}m ${seconds}s`;

}, 1000);

</script>

</body>
</html>
