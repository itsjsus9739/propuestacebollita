<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigación sentimental</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:Arial, sans-serif;
    overflow:hidden;
    color:white;
}

/* EFECTOS DE FONDO */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle, rgba(255,77,136,0.2), transparent 70%);
    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle, rgba(255,255,255,0.07), transparent 70%);
    bottom:-150px;
    right:-150px;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(255,255,255,0.05);
    padding:45px;
    border-radius:25px;
    backdrop-filter: blur(10px);
    box-shadow:0 0 25px rgba(255,255,255,0.05);
    width:90%;
    max-width:500px;
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

p{
    opacity:0.8;
}

.buttons{
    margin-top:35px;
    position:relative;
    height:140px;
}

/* BOTONES */
button{
    padding:15px 35px;
    border:none;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

/* BOTÓN SÍ */
#yes{
    background:#ff4d88;
    color:white;
    transition:0.25s;
    box-shadow:0 0 15px rgba(255,77,136,0.5);
}

/* BOTÓN NO */
#no{
    background:#444;
    color:white;
    position:absolute;
    left:58%;
    top:0;
    
    /* MOVIMIENTO MÁS SUAVE */
    transition:
    left 0.35s ease,
    top 0.35s ease;
}

/* TIMER */
.countdown{
    margin-top:25px;
    font-size:1.2rem;
}

#timer{
    margin-top:8px;
    font-size:1.5rem;
    font-weight:bold;
    color:#ff77aa;
}

</style>
</head>

<body>

<div class="container">

<h1>¿Quieres ser mi novia?</h1>

<p>
Sistema de compatibilidad iniciado correctamente.
</p>

<div class="buttons">

<button id="yes">Sí ❤️</button>

<button id="no">No ❌</button>

</div>

<div class="countdown">

⏳ Tiempo restante:

<div id="timer"></div>

</div>

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

let yesScale = 1;

/* MOVER BOTÓN NO */
function moveNoButton(){

    const buttonWidth = noBtn.offsetWidth;
    const buttonHeight = noBtn.offsetHeight;

    /* MÁRGENES DE SEGURIDAD */
    const margin = 20;

    /* LIMITES PARA QUE NO SALGA */
    const maxX = window.innerWidth - buttonWidth - margin;
    const maxY = window.innerHeight - buttonHeight - margin;

    const minX = margin;
    const minY = margin;

    const x = Math.random() * (maxX - minX) + minX;
    const y = Math.random() * (maxY - minY) + minY;

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;

}

/* ESCAPAR */
function escapeNo(){

    /* CRECER EL SÍ */
    yesScale += 0.08;

    yesBtn.style.transform = `scale(${yesScale})`;

    /* MOVER SOLO UNA VEZ */
    moveNoButton();

}

/* PC */
noBtn.addEventListener("mouseenter", escapeNo);

/* CELULAR */
noBtn.addEventListener("touchstart", (e) => {

    e.preventDefault();

    escapeNo();

});

/* BOTÓN SÍ */
yesBtn.onclick = () => {

document.body.innerHTML = `

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
">

<h1 style="
font-size:3rem;
margin-bottom:10px;
">
Excelente decisión
</h1>

<p style="
opacity:0.8;
margin-bottom:25px;
">
Compatibilidad confirmada exitosamente.
</p>

<img src="foto.jpg" style="
width:260px;
border-radius:25px;
box-shadow:0 0 25px rgba(255,255,255,0.2);
">


</div>

`;

};

/* CUENTA REGRESIVA */
const targetDate = new Date("June 3, 2026 00:00:00").getTime();

const timer = setInterval(() => {

    const now = new Date().getTime();

    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));

    const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
    );

    const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
    );

    const seconds = Math.floor(
        (distance % (1000 * 60)) /
        1000
    );

    document.getElementById("timer").innerHTML =
    `${days}d ${hours}h ${minutes}m ${seconds}s`;

    if(distance < 0){

        clearInterval(timer);

        document.getElementById("timer").innerHTML =
        "Tiempo agotado 💔";

    }

}, 1000);

</script>

</body>
</html>
