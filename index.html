<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigación sentimental</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

h1{
    font-size:2.5rem;
}

.buttons{
    margin-top:30px;
    position:relative;
}

button{
    padding:15px 35px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

#yes{
    background:#ff4d88;
    color:white;
    transition:0.3s;
}

#no{
    background:#444;
    color:white;
    position:absolute;
    transition:0.25s;
}

.countdown{
    margin-top:30px;
    font-size:1.3rem;
}

</style>
</head>

<body>

<div class="container">

<h1>¿Quieres ser mi novia?</h1>

<p>
Sistema de compatibilidad iniciado.
</p>

<div class="buttons">
<button id="yes">Sí 💕</button>
<button id="no">No ❌</button>
</div>

<div class="countdown">
⏳ Tiempo restante:
<div id="timer"></div>
</div>

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

let yesScale = 1;

// MOVER BOTÓN NO
function moveNoButton() {

const maxX = window.innerWidth - 150;
const maxY = window.innerHeight - 100;

const x = Math.random() * maxX;
const y = Math.random() * maxY;

noBtn.style.left = `${x}px`;
noBtn.style.top = `${y}px`;

}

// CUANDO INTENTEN DARLE AL NO
function escapeNo() {

moveNoButton();

// HACER MÁS GRANDE EL SÍ
yesScale += 0.08;

yesBtn.style.transform = `scale(${yesScale})`;

}

// PC
noBtn.addEventListener("mouseover", escapeNo);

// CELULAR
noBtn.addEventListener("touchstart", escapeNo);



// BOTÓN SÍ
yesBtn.onclick = () => {

document.body.innerHTML = `
<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#0f0f0f;
color:white;
font-family:Arial;
">

<h1>Excelente decisión.</h1>

<img src="foto.jpg" width="250" style="
border-radius:20px;
margin-top:20px;
box-shadow:0 0 25px rgba(255,255,255,0.2);
">

<p style="margin-top:20px;">
Compatibilidad confirmada exitosamente.
</p>

</div>
`;

};



// CONTADOR
const targetDate = new Date("June 3, 2026 00:00:00").getTime();

const timer = setInterval(() => {

const now = new Date().getTime();
const distance = targetDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML =
`${days}d ${hours}h ${minutes}m ${seconds}s`;

}, 1000);

</script>

</body>
</html>
